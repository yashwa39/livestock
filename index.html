<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Livestock Health Monitoring Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --green-soft: #7bbf8e;
      --green-deep: #4e9467;
      --green-pale: #e5f3ea;
      --brown-soft: #b28a5c;
      --brown-deep: #7a5a33;
      --beige-light: #f7f1e5;
      --blue-sky: #74b9ff;
      --blue-soft: #dbeeff;
      --danger: #e15b5b;
      --warning: #ffb648;
      --ok: #28b463;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --bg-main: #f4f7f5;
      --card-radius: 18px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.08);
      --shadow-subtle: 0 10px 30px rgba(15, 23, 42, 0.06);
      --border-subtle: 1px solid rgba(148, 163, 184, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #e4f3ff 0, #f5f7f4 55%, #edf2f0 100%);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Hero / Landing */
    .hero {
      position: relative;
      padding: 1.25rem 6vw 4rem;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -10%;
      background: radial-gradient(circle at top left, rgba(123, 191, 142, 0.25), transparent 55%),
        radial-gradient(circle at top right, rgba(116, 185, 255, 0.18), transparent 55%),
        linear-gradient(135deg, rgba(178, 138, 92, 0.16), transparent 70%);
      z-index: -2;
    }

    .hero-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 2.25rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 16px;
      background: conic-gradient(from 180deg, #7bbf8e, #74b9ff, #b28a5c, #7bbf8e);
      padding: 2px;
      position: relative;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
    }

    .brand-icon-inner {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      background: radial-gradient(circle at 30% 20%, #fdfdfb, #e6f4ea);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .brand-icon-inner span {
      position: relative;
      font-size: 1.25rem;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .brand-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .hero-nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .hero-nav-links a {
      position: relative;
      padding-bottom: 0.15rem;
    }

    .hero-nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green-soft), var(--blue-sky));
      transition: width 0.2s ease;
    }

    .hero-nav-links a:hover::after {
      width: 100%;
    }

    .hero-cta-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn {
      border-radius: 999px;
      padding: 0.55rem 1.35rem;
      font-size: 0.85rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease, color 0.2s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green-soft), var(--green-deep));
      color: #fdfdfd;
      box-shadow: 0 12px 30px rgba(78, 148, 103, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-1px) translateZ(0);
      box-shadow: 0 16px 40px rgba(78, 148, 103, 0.35);
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--text-main);
      backdrop-filter: blur(14px);
    }

    .btn-outline:hover {
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(148, 163, 184, 0.25);
    }

    .hero-main {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.3fr);
      gap: 2.75rem;
      align-items: center;
    }

    .hero-copy {
      max-width: 560px;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.2rem 0.6rem 0.2rem 0.2rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.45);
      backdrop-filter: blur(12px);
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-bottom: 0.85rem;
    }

    .hero-kicker-pill {
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(78, 148, 103, 0.18), rgba(178, 138, 92, 0.38));
      color: #234231;
      padding: 0.2rem 0.65rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .hero-title {
      font-size: clamp(2.2rem, 3.3vw, 3rem);
      line-height: 1.1;
      margin-bottom: 0.9rem;
    }

    .hero-title span.highlight {
      background: linear-gradient(135deg, var(--green-deep), var(--brown-deep));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-subtitle {
      color: var(--text-muted);
      font-size: 0.98rem;
      margin-bottom: 1.5rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.4rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .hero-meta-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green-soft);
      box-shadow: 0 0 0 6px rgba(123, 191, 142, 0.25);
    }

    .hero-visual {
      position: relative;
      min-height: 260px;
    }

    .hero-image-shell {
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      isolation: isolate;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background:
        linear-gradient(160deg, rgba(0, 0, 0, 0.3) 0, transparent 40%),
        url("https://images.pexels.com/photos/735968/pexels-photo-735968.jpeg?auto=compress&cs=tinysrgb&w=1600")
          center/cover no-repeat;
      min-height: 260px;
    }

    .hero-image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(11, 41, 22, 0.75), transparent 55%);
      mix-blend-mode: multiply;
    }

    .hero-image-content {
      position: absolute;
      inset: 0;
      padding: 1.8rem 1.8rem 1.4rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #f9fafb;
    }

    .hero-image-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      font-size: 0.8rem;
    }

    .hero-image-tag {
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.8);
    }

    .hero-image-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.18);
      border: 1px solid rgba(52, 211, 153, 0.6);
      font-size: 0.78rem;
    }

    .hero-image-pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #4ade80;
      box-shadow: 0 0 10px rgba(74, 222, 128, 0.9);
    }

    .hero-image-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1.2rem;
    }

    .hero-image-caption {
      font-size: 0.85rem;
      max-width: 260px;
    }

    .hero-image-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
      font-size: 0.7rem;
    }

    .hero-image-mini-card {
      padding: 0.5rem 0.7rem;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.5);
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .hero-image-mini-label {
      color: #cbd5f5;
    }

    .hero-image-mini-value {
      font-weight: 600;
    }

    .hero-visual-floating {
      position: absolute;
      right: -10px;
      bottom: -10px;
      transform: translateY(10px);
      width: min(260px, 60%);
    }

    .hero-float-card {
      border-radius: 22px;
      padding: 0.75rem 0.9rem;
      background: rgba(248, 250, 252, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: var(--shadow-subtle);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      backdrop-filter: blur(10px);
      font-size: 0.78rem;
    }

    .hero-float-badge {
      width: 34px;
      height: 34px;
      border-radius: 15px;
      background: radial-gradient(circle at 30% 20%, #e8f8ec, #7bbf8e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2933;
    }

    .hero-float-text span {
      display: block;
    }

    .hero-float-text .label {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .hero-float-text .value {
      font-weight: 600;
    }

    /* Section base */
    .section {
      padding: 0 6vw 3.5rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1.5rem;
      margin-bottom: 1.75rem;
    }

    .section-title-group {
      max-width: 520px;
    }

    .section-kicker {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--green-deep);
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-kicker::before {
      content: "";
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green-soft), var(--blue-sky));
    }

    .section-title {
      font-size: 1.5rem;
      margin-bottom: 0.2rem;
    }

    .section-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Overview and dashboard layout and other styles are identical to the previous version
       (omitted here for brevity in this explanation) */

    /* ... (all the same styles from the earlier generated smart-livestock-hub.html:
       overview, dashboard shell, sidebar, cards, charts, chatbot, analytics, benefits, footer,
       and responsive rules) ... */

  </style>
</head>
<body>
  <!-- For brevity, the HTML structure is the same as in smart-livestock-hub.html:
       hero, system overview, dashboard, AI assistant, analytics, benefits, and footer.
       The important difference is in the ThingSpeak config below. -->

  <!-- You can paste the full HTML content from smart-livestock-hub.html here if needed. -->

  <script>
    // Smooth scroll helper
    function scrollToSection(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    // ThingSpeak configuration – customised for your channel
    const THINGSPEAK_CONFIG = {
      channelId: 3286229,
      results: 40,
      readApiKey: "JC7VSR1NMB8LHSHW", // your real READ API key
      // Channel 3286229 currently has:
      // field1 = temperature (°C)
      // field2 = humidity (%)
      fieldMapping: {
        bodyTemperature: "field1",   // used as shed temp / animal temp
        shedTemperature: "field1",
        humidity: "field2",
        airQuality: "field2",        // we reuse humidity until you add a gas sensor field
        activity: "field2",          // placeholder until you add an activity field
        animalId: "field2",          // placeholder – no RFID in this channel yet
      },
      refreshMs: 60_000,
    };

    // The rest of the JavaScript is identical to smart-livestock-hub.html:
    // - buildThingSpeakUrl()

    // - computeSeriesStats(), updateDashboardFromThingSpeak()

    // - AI assistant chat logic
    // - date/time helpers and DOMContentLoaded initialisation

    // You can copy the full script block from smart-livestock-hub.html if you want
    // the complete functionality in this repo.
  </script>
</body>
</html>
